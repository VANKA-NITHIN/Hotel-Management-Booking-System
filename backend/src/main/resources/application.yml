server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

  datasource:
    url: jdbc:mysql://localhost:3306/luxurystay?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000

  sql:
    init:
      mode: never

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
    drop-first: false

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@luxurystay.com}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          ssl:
            trust: smtp.gmail.com
          debug: false
  thymeleaf:
    check-template-location: false

  cache:
    type: caffeine

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-token-generation-must-be-long-enough}
  expiration: 86400000  # 24 hours
  refresh-expiration: 604800000  # 7 days
  header: Authorization
  prefix: "Bearer "

# Cloudinary Configuration
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:dfzumcljt}
  api-key: ${CLOUDINARY_API_KEY:776629485451896}
  api-secret: ${CLOUDINARY_API_SECRET:}

# Stripe Configuration
stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  publishable-key: ${STRIPE_PUBLISHABLE_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

# Razorpay Configuration
razorpay:
  key-id: ${RAZORPAY_KEY_ID:YOUR_RAZORPAY_KEY_ID}
  key-secret: ${RAZORPAY_KEY_SECRET:YOUR_RAZORPAY_KEY_SECRET}

# Clerk Configuration
clerk:
  jwks-url: https://engaging-fish-44.clerk.accounts.dev/.well-known/jwks.json
  secret-key: ${CLERK_SECRET_KEY:YOUR_CLERK_SECRET_KEY}

# OpenRouter (AI Assistant)
openrouter:
  api-key: ${OPENROUTER_API_KEY:YOUR_OPENROUTER_API_KEY}
  model: ${OPENROUTER_MODEL:meta-llama/llama-4-maverick:free}

# Application specific
app:
  jwt-issuer: LuxuryStay
  cors:
    allowed-origins: http://localhost:5173,http://localhost:5175,http://localhost:3000
  upload:
    max-files: 10

---
# Dev profile
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:mysql://localhost:3306/luxurystay_dev?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root

  jpa:
    show-sql: true

logging:
  level:
    com.luxurystay: DEBUG
    org.springframework.security: DEBUG

---
# Test profile
spring:
  config:
    activate:
      on-profile: test

  liquibase:
    enabled: false

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MYSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

---
# Production profile
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:h2:mem:luxurystay_prod
    username: sa
    password: password
    driver-class-name: org.h2.Driver

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect

logging:
  level:
    com.luxurystay: INFO
    org.springframework: WARN
