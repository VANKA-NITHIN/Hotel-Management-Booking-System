# Standard Bean Validation Messages
javax.validation.constraints.NotNull.message=This field cannot be null.
javax.validation.constraints.NotBlank.message=This field cannot be blank.
javax.validation.constraints.NotEmpty.message=This field cannot be empty.
javax.validation.constraints.Email.message=Please provide a valid email address.
javax.validation.constraints.Size.message=Size must be between {min} and {max}.
javax.validation.constraints.Min.message=Value must be greater than or equal to {value}.
javax.validation.constraints.Max.message=Value must be less than or equal to {value}.

